name: Bug Report
description: Report a bug or issue in JulesOps
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the details below.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the issue...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Install kit with ...
        2. Run workflow ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
      placeholder: What should have happened...
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context & Environment
      description: OS, PowerShell version, Git version, gh CLI version.
      placeholder: OS version, PowerShell version, etc.
    validations:
      required: false
