name: Jules Task
description: Structured implementation task for JulesOps-managed Google Jules work
title: "[Jules] "
labels:
  - jules-queue
  - status:todo

body:
  - type: markdown
    attributes:
      value: |
        Use this template for implementation tasks intended for Google Jules under JulesOps.

        Jules should:
        - implement only the scope described here
        - keep changes minimal and targeted
        - run relevant verification for the changed surfaces when available
        - open a PR targeting the configured base branch for the repository
        - leave a blocked comment instead of guessing if the task is underspecified

  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What should be achieved?
      placeholder: |
        Describe the desired end result in plain language.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What should Jules change, and what should it avoid touching?
      placeholder: |
        Include concrete boundaries.

        Examples:
        - Add a new migration under supabase/migrations/
        - Update the affected SQL views / RPCs that depend on the renamed column
        - Do not redesign unrelated ingestion logic
        - Do not refactor unrelated dashboard views
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Checklist Jules must satisfy before the task is considered complete
      value: |
        - [ ] The requested behavior is implemented
        - [ ] Existing behavior outside the issue scope remains unchanged
        - [ ] Relevant verification was run and reported honestly
        - [ ] A PR targeting the configured base branch is opened and linked back to this issue
    validations:
      required: true

  - type: textarea
    id: impacted_surfaces
    attributes:
      label: Impacted surfaces
      description: Which parts of the repo are expected to change?
      placeholder: |
        Examples:
        - Migration(s): ...
        - Views / RPCs: ...
        - Edge functions / backend code: ...
        - Shared helpers: ...
        - README / docs
    validations:
      required: false

  - type: textarea
    id: implementation_notes
    attributes:
      label: Implementation notes / file hints
      description: Relevant files, architecture notes, query expectations, or implementation hints
      placeholder: |
        Examples:
        - Relevant files: ...
        - Reuse the existing tracked_repositories pattern
        - Preserve webhook signature verification behavior
        - Prefer a reusable abstraction rather than one-off duplicated logic
    validations:
      required: false

  - type: textarea
    id: out_of_scope
    attributes:
      label: Explicitly out of scope
      description: Optional but recommended — what should Jules avoid changing even if it looks related?
      placeholder: |
        Examples:
        - Do not refactor unrelated workflows
        - Do not change release automation in this issue
        - Do not redesign the dashboard while implementing a queue change
    validations:
      required: false

  - type: textarea
    id: testing_notes
    attributes:
      label: Verification / testing notes
      description: Optional verification commands, manual checks, or scenarios Jules should keep in mind
      placeholder: |
        Examples:
        - Run the relevant test suite for the changed package
        - Verify the updated migration still compiles against dependent views
        - Confirm the PR targets the configured base branch
    validations:
      required: false
