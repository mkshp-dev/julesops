name: Feature Request
description: Propose a new feature or improvement for JulesOps
title: "[Feature]: "
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for JulesOps? We'd love to hear it!
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of the proposed feature.
      placeholder: What would you like to add...
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: Is your feature request related to a problem? Please describe.
      placeholder: I'm frustrated when...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution or behavior you'd like to see.
      placeholder: Describe how it should work...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or features you've considered.
      placeholder: Any other ways to solve this...
    validations:
      required: false
