name: JulesOps Kit CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-kit:
    name: Validate kit and installer
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate source kit
        shell: pwsh
        run: .\scripts\validate-kit.ps1

      - name: Run fixture smoke test
        shell: pwsh
        run: .\scripts\test-fixture.ps1
  validate-server:
    name: Validate hosted server skeleton
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start server and run smoke test
        shell: pwsh
        run: |
          cd server
          $env:GITHUB_WEBHOOK_SECRET="ci-secret"
          $process = Start-Process -FilePath node -ArgumentList "src/server.js" -PassThru -WindowStyle Hidden
          try {
            Start-Sleep -Seconds 2
            npm run smoke
          }
          finally {
            Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
          }