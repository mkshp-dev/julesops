name: Jules State Sync

on:
  pull_request:
    types:
      - opened
      - reopened
      - closed
  issue_comment:
    types:
      - created

permissions:
  contents: read
  issues: write
  pull-requests: read

env:
  GH_TOKEN: ${{ github.token }}
  JULESOPS_CONFIG_PATH: .github/julesops.yml

jobs:
  sync_from_pr:
    name: Sync Jules issue state from PR events
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve JulesOps configuration
        id: config
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f "$JULESOPS_CONFIG_PATH" ]; then
            echo "Missing $JULESOPS_CONFIG_PATH" >&2
            exit 1
          fi

          python3 - <<'PY'
          import yaml

          path = ".github/julesops.yml"
          with open(path, "r", encoding="utf-8") as f:
              raw = yaml.safe_load(f) or {}

          cfg = raw.get("julesops", {})
          states = cfg.get("states", {})
          queue = cfg.get("queue", {})
          issue_completion = cfg.get("issue_completion", {})

          values = {
              "queue_label": queue.get("queue_label", "jules-queue"),
              "status_in_progress": states.get("in_progress", "status:in-progress"),
              "status_review": states.get("review", "status:review"),
              "status_blocked": states.get("blocked", "status:blocked"),
              "status_done": states.get("done", "status:done"),
              "close_on_merge": str(issue_completion.get("close_on_merge", True)).lower(),
          }

          with open("/tmp/julesops_outputs.txt", "w", encoding="utf-8") as out:
              for k, v in values.items():
                  out.write(f"{k}={v}\n")
          PY

          while IFS='=' read -r key value; do
            echo "$key=$value" >> "$GITHUB_OUTPUT"
          done < /tmp/julesops_outputs.txt

      - name: Extract linked issue number from PR body
        id: linked_issue
        shell: bash
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail

          issue_number="$(printf '%s\n' "$PR_BODY" | grep -Eio '\b(close[sd]?|fix(e[sd])?|resolve[sd]?) #[0-9]+' | head -n1 | grep -Eo '#[0-9]+' | tr -d '#' || true)"

          if [ -z "${issue_number:-}" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "issue_number=$issue_number" >> "$GITHUB_OUTPUT"

      - name: Check that linked issue is a Jules issue
        id: issue_meta
        if: steps.linked_issue.outputs.found == 'true'
        shell: bash
        run: |
          set -euo pipefail

          ISSUE_NUMBER="${{ steps.linked_issue.outputs.issue_number }}"
          QUEUE_LABEL="${{ steps.config.outputs.queue_label }}"

          gh issue view "$ISSUE_NUMBER" \
            --repo "${{ github.repository }}" \
            --json number,state,labels \
            > issue.json

          is_jules="$(jq -r --arg queue_label "$QUEUE_LABEL" 'any(.labels[]; .name == $queue_label)' issue.json)"
          issue_state="$(jq -r '.state' issue.json)"

          echo "is_jules=$is_jules" >> "$GITHUB_OUTPUT"
          echo "issue_state=$issue_state" >> "$GITHUB_OUTPUT"

      - name: Move issue to review when PR opens
        if: >
          steps.linked_issue.outputs.found == 'true' &&
          steps.issue_meta.outputs.is_jules == 'true' &&
          (github.event.action == 'opened' || github.event.action == 'reopened')
        shell: bash
        run: |
          set -euo pipefail

          ISSUE_NUMBER="${{ steps.linked_issue.outputs.issue_number }}"
          STATUS_IN_PROGRESS="${{ steps.config.outputs.status_in_progress }}"
          STATUS_BLOCKED="${{ steps.config.outputs.status_blocked }}"
          STATUS_REVIEW="${{ steps.config.outputs.status_review }}"

          gh issue edit "$ISSUE_NUMBER" --repo "${{ github.repository }}" --remove-label "$STATUS_IN_PROGRESS" || true
          gh issue edit "$ISSUE_NUMBER" --repo "${{ github.repository }}" --remove-label "$STATUS_BLOCKED" || true
          gh issue edit "$ISSUE_NUMBER" --repo "${{ github.repository }}" --add-label "$STATUS_REVIEW" || true

      - name: Mark issue done and close it when PR is merged
        if: >
          steps.linked_issue.outputs.found == 'true' &&
          steps.issue_meta.outputs.is_jules == 'true' &&
          github.event.action == 'closed' &&
          github.event.pull_request.merged == true
        shell: bash
        run: |
          set -euo pipefail

          ISSUE_NUMBER="${{ steps.linked_issue.outputs.issue_number }}"
          STATUS_IN_PROGRESS="${{ steps.config.outputs.status_in_progress }}"
          STATUS_REVIEW="${{ steps.config.outputs.status_review }}"
          STATUS_BLOCKED="${{ steps.config.outputs.status_blocked }}"
          STATUS_DONE="${{ steps.config.outputs.status_done }}"

          gh issue edit "$ISSUE_NUMBER" --repo "${{ github.repository }}" --remove-label "$STATUS_IN_PROGRESS" || true
          gh issue edit "$ISSUE_NUMBER" --repo "${{ github.repository }}" --remove-label "$STATUS_REVIEW" || true
          gh issue edit "$ISSUE_NUMBER" --repo "${{ github.repository }}" --remove-label "$STATUS_BLOCKED" || true
          gh issue edit "$ISSUE_NUMBER" --repo "${{ github.repository }}" --add-label "$STATUS_DONE" || true

          if [ "${{ steps.config.outputs.close_on_merge }}" = "true" ]; then
            gh issue close "$ISSUE_NUMBER" \
              --repo "${{ github.repository }}" \
              --comment "Closing automatically because the linked Jules PR was merged."
          fi

      - name: Mark issue blocked if PR is closed without merge
        if: >
          steps.linked_issue.outputs.found == 'true' &&
          steps.issue_meta.outputs.is_jules == 'true' &&
          github.event.action == 'closed' &&
          github.event.pull_request.merged != true
        shell: bash
        run: |
          set -euo pipefail

          ISSUE_NUMBER="${{ steps.linked_issue.outputs.issue_number }}"
          STATUS_IN_PROGRESS="${{ steps.config.outputs.status_in_progress }}"
          STATUS_REVIEW="${{ steps.config.outputs.status_review }}"
          STATUS_BLOCKED="${{ steps.config.outputs.status_blocked }}"

          gh issue edit "$ISSUE_NUMBER" --repo "${{ github.repository }}" --remove-label "$STATUS_IN_PROGRESS" || true
          gh issue edit "$ISSUE_NUMBER" --repo "${{ github.repository }}" --remove-label "$STATUS_REVIEW" || true
          gh issue edit "$ISSUE_NUMBER" --repo "${{ github.repository }}" --add-label "$STATUS_BLOCKED" || true

          gh issue comment "$ISSUE_NUMBER" \
            --repo "${{ github.repository }}" \
            --body "The linked Jules PR was closed without merge. Marking this issue as \`$STATUS_BLOCKED\` for maintainer review."

  sync_from_issue_comment:
    name: Sync Jules issue state from blocked comment
    if: github.event_name == 'issue_comment' && github.event.issue.pull_request == null
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve JulesOps configuration
        id: config
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f "$JULESOPS_CONFIG_PATH" ]; then
            echo "Missing $JULESOPS_CONFIG_PATH" >&2
            exit 1
          fi

          python3 - <<'PY'
          import yaml

          path = ".github/julesops.yml"
          with open(path, "r", encoding="utf-8") as f:
              raw = yaml.safe_load(f) or {}

          cfg = raw.get("julesops", {})
          states = cfg.get("states", {})
          queue = cfg.get("queue", {})
          blocked_comment = cfg.get("blocked_comment", {})

          values = {
              "queue_label": queue.get("queue_label", "jules-queue"),
              "status_in_progress": states.get("in_progress", "status:in-progress"),
              "status_blocked": states.get("blocked", "status:blocked"),
              "blocked_marker": blocked_comment.get("marker", "## Blocked"),
          }

          with open("/tmp/julesops_outputs.txt", "w", encoding="utf-8") as out:
              for k, v in values.items():
                  out.write(f"{k}={v}\n")
          PY

          while IFS='=' read -r key value; do
            echo "$key=$value" >> "$GITHUB_OUTPUT"
          done < /tmp/julesops_outputs.txt

      - name: Check whether this is a Jules issue
        id: issue_meta
        shell: bash
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail

          QUEUE_LABEL="${{ steps.config.outputs.queue_label }}"
          STATUS_IN_PROGRESS="${{ steps.config.outputs.status_in_progress }}"

          gh issue view "$ISSUE_NUMBER" \
            --repo "${{ github.repository }}" \
            --json number,state,labels \
            > issue.json

          is_jules="$(jq -r --arg queue_label "$QUEUE_LABEL" 'any(.labels[]; .name == $queue_label)' issue.json)"
          has_in_progress="$(jq -r --arg in_progress "$STATUS_IN_PROGRESS" 'any(.labels[]; .name == $in_progress)' issue.json)"

          echo "is_jules=$is_jules" >> "$GITHUB_OUTPUT"
          echo "has_in_progress=$has_in_progress" >> "$GITHUB_OUTPUT"

      - name: Move issue to blocked if comment looks like Jules blocked output
        if: >
          steps.issue_meta.outputs.is_jules == 'true' &&
          steps.issue_meta.outputs.has_in_progress == 'true' &&
          contains(github.event.comment.body, steps.config.outputs.blocked_marker)
        shell: bash
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail

          STATUS_IN_PROGRESS="${{ steps.config.outputs.status_in_progress }}"
          STATUS_BLOCKED="${{ steps.config.outputs.status_blocked }}"

          gh issue edit "$ISSUE_NUMBER" --repo "${{ github.repository }}" --remove-label "$STATUS_IN_PROGRESS" || true
          gh issue edit "$ISSUE_NUMBER" --repo "${{ github.repository }}" --add-label "$STATUS_BLOCKED" || true
